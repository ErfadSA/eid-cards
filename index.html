<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هنّئ أحبابك بعيد الفطر باسمك مع إرفاد</title>

  <style>
    @font-face{
      font-family: "montaser";
      src: url("./montaser.ttf") format("truetype");
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:20px;
      font-family:"montaser", sans-serif;
      background:#0b1d4a;
      color:white;
      text-align:center;
    }

    .logo{
      width:120px;
      max-width:40%;
      margin:10px auto 14px;
      display:block;
    }

    h2{
      margin:0 0 20px;
      line-height:1.6;
      font-size:20px;
      font-weight:normal;
    }

    input{
      padding:14px;
      font-size:14px;
      border-radius:14px;
      border:none;
      margin:10px auto;
      width:260px;
      max-width:90%;
      text-align:center;
      display:block;
      font-family:"montaser";
    }

    button{
      padding:14px 24px;
      font-size:14px;
      border:none;
      border-radius:14px;
      background:#148B5E;
      color:white;
      margin:8px;
      cursor:pointer;
      font-family:"montaser";
    }

    /* ===== السلايدر ===== */
    .slider{
      display:flex;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      margin:20px 0;
    }

    .slider::-webkit-scrollbar{
      display:none;
    }

    .slide{
      flex:0 0 70%;
      margin:0 5%;
      scroll-snap-align:center;
      transition:transform 0.35s ease, opacity 0.3s;
      opacity:0.5;
      position:relative;
    }

    .slide img{
      width:100%;
      border-radius:20px;
    }

    .slide.active{
      transform:scale(1.1);
      opacity:1;
    }

    /* الاسم داخل السلايدر */
    .slide-name{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:18%;
      width:80%;
      text-align:center;
      font-size:14px;
      color:white;
      pointer-events:none;
    }

    .note{
      margin-top:10px;
      font-size:14px;
      color:#ffdede;
      min-height:28px;
    }
  </style>
</head>
<body>

  <img src="./logo.png" class="logo">

  <h2>هنّئ أحبابك بعيد الفطر باسمك مع إرفاد</h2>

  <input id="name" type="text" placeholder="اكتب اسمك">

  <!-- السلايدر -->
  <div class="slider" id="slider">
    <div class="slide" data-img="./eid2.png">
      <img src="./eid2.png">
      <div class="slide-name"></div>
    </div>

    <div class="slide" data-img="./eid.PNG">
      <img src="./eid.PNG">
      <div class="slide-name"></div>
    </div>

    <div class="slide" data-img="./eid3.png">
      <img src="./eid3.png">
      <div class="slide-name"></div>
    </div>

    <div class="slide" data-img="./eid4.png">
      <img src="./eid4.png">
      <div class="slide-name"></div>
    </div>
  </div>

  <button onclick="downloadCard()">تحميل البطاقة</button>

  <div class="note" id="note"></div>

<script>
const slider = document.getElementById("slider");
const slides = document.querySelectorAll(".slide");
const nameInput = document.getElementById("name");

/* تحديد العنصر الأوسط بدون اهتزاز */
function getSelectedImage(){
  let closest = 0;
  let minDistance = Infinity;

  slides.forEach((slide, i)=>{
    const slideCenter = slide.offsetLeft + (slide.offsetWidth / 2);
    const sliderCenter = slider.scrollLeft + (slider.offsetWidth / 2);

    const distance = Math.abs(sliderCenter - slideCenter);

    if(distance < minDistance){
      minDistance = distance;
      closest = i;
    }
  });

  slides.forEach(s => s.classList.remove("active"));
  slides[closest].classList.add("active");

  return slides[closest].getAttribute("data-img");
}

slider.addEventListener("scroll", getSelectedImage);
window.onload = getSelectedImage;

/* كتابة الاسم مباشرة على التصاميم */
nameInput.addEventListener("input", () => {
  document.querySelectorAll(".slide-name").forEach(el=>{
    el.textContent = nameInput.value;
  });
});

/* التحميل */
function downloadCard(){
  const name = nameInput.value.trim();
  const selected = getSelectedImage();

  if(name === ""){
    alert("اكتب الاسم أولاً");
    return;
  }

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = selected + "?v=" + new Date().getTime();

  img.onload = function(){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    ctx.drawImage(img, 0, 0);

    ctx.textAlign = "center";
    ctx.direction = "rtl";

    if(selected === "./eid2.png"){
      ctx.fillStyle = "white";
      ctx.font = "80px montaser";
      ctx.fillText(name, canvas.width / 2, canvas.height * 0.80);
    }else{
      ctx.fillStyle = "#0b1d4a";
      ctx.font = "46px montaser";
      ctx.fillText(name, canvas.width / 2, canvas.height * 0.81);
    }

    const link = document.createElement("a");
    link.download = "eid-card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };
}
</script>

</body>
</html>
