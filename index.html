<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هنئ أحبابك بعيد الفطر ببطاقة خاصة باسمك مع إرفاد</title>

<style>

body{
font-family:sans-serif;
background:#0b1d4a;
color:white;
text-align:center;
padding:20px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
margin:15px;
}

.cards{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.card{
position:relative;
width:260px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:15px;
}

.name{
position:absolute;
bottom:22%; /* رفع الاسم قليلاً */
width:100%;
text-align:center;
font-size:26px;
font-weight:bold;
}

</style>
</head>

<body>

<h2>اكتب اسمك ثم اختر البطاقة</h2>

<input id="name" placeholder="اكتب الاسم">

<div class="cards">

<div class="card" onclick="showCard(1)">
<img src="eid.png">
<div class="name" id="name1"></div>
</div>

<div class="card" onclick="showCard(2)">
<img src="eid2.png">
<div class="name" id="name2"></div>
</div>

</div>

<script>

function showCard(num){

let name=document.getElementById("name").value;

if(name==""){
alert("اكتب الاسم أولاً");
return;
}

if(num==1){
document.getElementById("name1").innerText=name;
document.getElementById("name1").style.color="#0b1d4a"; // كحلي
}

if(num==2){
document.getElementById("name2").innerText=name;
document.getElementById("name2").style.color="white";
}

}

</script>

</body>
</html>
