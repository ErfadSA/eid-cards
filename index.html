<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>هنّئ أحبابك بعيد الفطر باسمك مع إرفاد</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0b1d4a;
color:white;
text-align:center;
padding:20px;
}

h2{
margin-bottom:20px;
}

input, select{
padding:12px;
font-size:12px;
border-radius:10px;
border:none;
margin:10px;
text-align:center;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#d4af37;
color:white;
margin:10px;
cursor:pointer;
}

.card{
position:relative;
width:90%;
max-width:400px;
margin:30px auto;
display:none;
}

.card img{
width:100%;
border-radius:20px;
}

.name{
position:absolute;
bottom:20%;   /* رفع الاسم عن الأسفل */
width:100%;
text-align:center;
font-size:12px;
font-weight:bold;
}

</style>
</head>

<body>

<h2>هنّئ أحبابك بعيد الفطر باسمك مع إرفاد</h2>

<input id="name" placeholder="اكتب اسمك">

<br>

<select id="cardSelect">
<option value="eid.PNG">تصميم قماشي</option>
<option value="eid2.PNG">تصميم رسمي</option>
</select>

<br>

<button onclick="showCard()">عرض البطاقة</button>

<div class="card" id="card">

<img id="cardImg">

<div class="name" id="cardName"></div>

</div>

<script>

function showCard(){

let name=document.getElementById("name").value;

if(name==""){
alert("اكتب الاسم أولاً");
return;
}

let selected=document.getElementById("cardSelect").value;

document.getElementById("cardImg").src=selected;

let cardName=document.getElementById("cardName");

cardName.innerText=name;

/* اللون حسب التصميم */

if(selected=="eid.PNG"){
cardName.style.color="#0b1d4a";   // كحلي للتصميم القماشي
}else{
cardName.style.color="white";     // للتصميم الرسمي
}

document.getElementById("card").style.display="block";

}

</script>

</body>
</html>
