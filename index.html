<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>هنّئ أحبابك بعيد الفطر باسمك مع إرفاد</title>

<style>

@font-face{
font-family: montaser;
src: url("montaser.ttf");
}

body{
font-family: montaser;
background:#0b1d4a;
color:white;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
}

input,select{
padding:12px;
font-size:16px;
border-radius:10px;
border:none;
margin:10px;
width:230px;
text-align:center;
font-family:montaser;
}

button{
padding:12px 22px;
font-size:16px;
border:none;
border-radius:10px;
background:#d4af37;
color:white;
margin:10px;
cursor:pointer;
font-family:montaser;
}

.card{
position:relative;
width:90%;
max-width:420px;
margin:35px auto;
display:none;
}

.card img{
width:100%;
border-radius:20px;
}

.name{
position:absolute;
bottom:15%;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h2>هنّئ أحبابك بعيد الفطر باسمك مع إرفاد</h2>

<input id="name" placeholder="اكتب اسمك">

<br>

<select id="cardSelect">
<option value="eid.PNG">تصميم قماشي</option>
<option value="eid2.png">تصميم رسمي</option>
</select>

<br>

<button onclick="showCard()">عرض البطاقة</button>
<button onclick="downloadCard()">تحميل البطاقة</button>

<div class="card" id="card">

<img id="cardImg">

<div class="name" id="cardName"></div>

</div>

<script>

function showCard(){

let name=document.getElementById("name").value.trim();

if(name===""){
alert("اكتب الاسم أولاً");
return;
}

let selected=document.getElementById("cardSelect").value;

let img=document.getElementById("cardImg");

img.src=selected;

let cardName=document.getElementById("cardName");

cardName.innerText=name;

if(selected==="eid.PNG"){
cardName.style.color="#0b1d4a";
cardName.style.fontSize="20px";
}else{
cardName.style.color="white";
cardName.style.fontSize="24px";
}

document.getElementById("card").style.display="block";

}


function downloadCard(){

let name=document.getElementById("name").value.trim();

if(name===""){
alert("اكتب الاسم أولاً");
return;
}

let selected=document.getElementById("cardSelect").value;

let canvas=document.createElement("canvas");

let img=new Image();

img.src=selected;

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0);

if(selected==="eid.PNG"){
ctx.font="45px montaser";
ctx.fillStyle="#0b1d4a";
}else{
ctx.font="60px montaser";
ctx.fillStyle="white";
}

ctx.textAlign="center";

ctx.fillText(name,canvas.width/2,canvas.height*0.72);

let link=document.createElement("a");

link.download="eid-card.png";

link.href=canvas.toDataURL();

link.click();

}

}

</script>

</body>
</html>
